services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/pull-models.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # GPU support (optional - remove deploy section for CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - rag-network

  # RAG Admin Interface
  rag-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-admin
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - vector_stores:/app/vector_stores
      - ./data:/app/data:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_STORE_DIR=/app/vector_stores
      - METADATA_FILE=metadata.json
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_started
    command: >
      streamlit run rag-admin.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # RAG User Interface
  rag-user:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-user
    restart: unless-stopped
    ports:
      - "8502:8502"
    volumes:
      - vector_stores:/app/vector_stores
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_STORE_DIR=/app/vector_stores
      - METADATA_FILE=metadata.json
      - STREAMLIT_SERVER_PORT=8502
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_started
      rag-admin:
        condition: service_started
    command: >
      streamlit run rag-user.py
      --server.port=8502
      --server.address=0.0.0.0
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ollama_data:
    driver: local
  vector_stores:
    driver: local

networks:
  rag-network:
    driver: bridge
